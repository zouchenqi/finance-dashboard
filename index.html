<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>星宇的每日财经简报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;
  --bg2:#0f1218;
  --bg3:#161b24;
  --bg4:#1c2333;
  --border:#1e2736;
  --border2:#252f42;
  --text:#e2e8f0;
  --text2:#8899b0;
  --text3:#4a5568;
  --up:#00d97e;
  --up-dim:#00d97e22;
  --down:#ff4d6a;
  --down-dim:#ff4d6a22;
  --flat:#8899b0;
  --accent:#00c2ff;
  --accent-dim:#00c2ff15;
  --gold:#f5c842;
  --gold-dim:#f5c84215;
  --radius:10px;
  --radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh}
body{
  font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);
  color:var(--text);
  /* subtle grid texture */
  background-image:
    linear-gradient(rgba(0,194,255,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,194,255,.03) 1px,transparent 1px);
  background-size:40px 40px;
}

/* ── HEADER ── */
.header{
  width:100%;background:rgba(10,12,16,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 56px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.header-left{display:flex;align-items:center;gap:16px}
.logo{
  width:36px;height:36px;
  background:linear-gradient(135deg,var(--accent),#0070ff);
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  box-shadow:0 0 20px rgba(0,194,255,.3);
}
.header-title{
  font-family:'Syne',sans-serif;
  color:var(--text);font-size:17px;font-weight:700;letter-spacing:.5px;
}
.header-title span{color:var(--accent)}
.header-sub{color:var(--text3);font-size:11px;margin-top:2px;font-family:'DM Mono',monospace}
.header-right{display:flex;align-items:center;gap:12px}
.status-pill{
  display:flex;align-items:center;gap:6px;
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text2);font-size:11px;font-weight:500;
  padding:5px 14px;border-radius:20px;
  font-family:'DM Mono',monospace;
}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.status-dot.live{background:var(--up);box-shadow:0 0 8px var(--up)}
.upd-time{font-size:10px;color:var(--text3);margin-top:2px;text-align:right;font-family:'DM Mono',monospace}

/* ── LAYOUT ── */
.wrap{width:100%;max-width:1440px;margin:0 auto;padding:32px 56px 60px}

/* ── SECTION HEADERS ── */
.sec{display:flex;align-items:center;gap:12px;margin:36px 0 14px}
.sec:first-child{margin-top:0}
.sec-label{
  font-family:'Syne',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--text3);white-space:nowrap;
}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-accent{width:20px;height:2px;border-radius:1px;background:var(--accent);flex-shrink:0}

/* ── GRIDS ── */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
@media(max-width:1100px){.g4,.g5{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.g4,.g3,.g2,.g5{grid-template-columns:1fr}.wrap{padding:20px 16px}.header{padding:0 20px}}

/* ── BASE CARD ── */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:16px 18px;
  transition:border-color .2s,transform .2s,box-shadow .2s;
}
.card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}

/* ── INDEX CARDS ── */
.idx-flag{font-size:10px;color:var(--text3);letter-spacing:.5px;font-family:'DM Mono',monospace;margin-bottom:4px}
.idx-val{font-size:26px;font-weight:700;margin:6px 0 5px;letter-spacing:-1px;line-height:1;font-family:'DM Mono',monospace}
.idx-chg{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;font-weight:600;padding:3px 9px;border-radius:5px;
  font-family:'DM Mono',monospace;letter-spacing:.3px;
}
.idx-prev{font-size:10px;color:var(--text3);margin-top:8px;font-family:'DM Mono',monospace}
.idx-bar{height:2px;border-radius:1px;margin-top:12px;opacity:.6}
.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--flat)}
.up-bg{background:var(--up-dim);border-color:#00d97e22!important}
.up-bg .idx-val{color:var(--up)}
.up-bg .idx-chg{background:rgba(0,217,126,.15);color:var(--up)}
.down-bg{background:var(--down-dim);border-color:#ff4d6a22!important}
.down-bg .idx-val{color:var(--down)}
.down-bg .idx-chg{background:rgba(255,77,106,.15);color:var(--down)}
.flat-bg .idx-chg{background:var(--bg3);color:var(--text2)}

/* ── SKELETON ── */
.sk{
  background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);
  background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:4px;
}
.sk-h{height:26px;width:60%}.sk-s{height:11px;width:35%;margin-top:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── MARKET CARDS (成交额/涨跌/北向) ── */
.flow-lbl{
  font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text3);margin-bottom:12px;font-family:'Syne',sans-serif;
}
.flow-val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace}
.flow-sub{font-size:10px;color:var(--text3);margin-top:4px;font-family:'DM Mono',monospace}
.flow-track{height:2px;background:var(--border2);border-radius:1px;margin-top:16px;overflow:hidden}
.flow-fill{height:100%;border-radius:1px;transition:width 1.4s cubic-bezier(.16,1,.3,1)}

.mcard{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px 22px;
  position:relative;overflow:hidden;
  transition:border-color .2s,transform .2s,box-shadow .2s;
}
.mcard:hover{transform:translateY(-2px)}
/* left accent bar */
.mcard::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:2px;border-radius:1px;
}
.mcard-vol{border-color:#00c2ff22}
.mcard-vol:hover{border-color:var(--accent);box-shadow:0 0 30px rgba(0,194,255,.08)}
.mcard-vol::before{background:var(--accent)}
.mcard-breadth{border-color:#00d97e22}
.mcard-breadth:hover{border-color:var(--up);box-shadow:0 0 30px rgba(0,217,126,.08)}
.mcard-breadth::before{background:var(--up)}
.mcard-north{border-color:#f5c84222}
.mcard-north:hover{border-color:var(--gold);box-shadow:0 0 30px rgba(245,200,66,.08)}
.mcard-north::before{background:var(--gold)}
/* corner decoration */
.mcard-corner{
  position:absolute;top:14px;right:16px;
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;
  color:var(--text3);text-transform:uppercase;
}
.mcard-badge{
  display:inline-block;
  border:1px solid var(--border2);
  border-radius:4px;font-size:9px;font-weight:600;
  padding:2px 8px;color:var(--text3);margin-bottom:10px;
  font-family:'DM Mono',monospace;letter-spacing:.5px;
}

/* ── REFRESH DIVIDER ── */
.refresh-divider{display:flex;align-items:center;gap:20px;margin:28px 0}
.rdl,.rdr{flex:1;height:1px;background:var(--border)}
.big-btn{
  display:flex;align-items:center;gap:8px;
  background:transparent;color:var(--accent);
  border:1px solid var(--accent);
  padding:10px 28px;border-radius:6px;
  font-size:12px;font-weight:600;letter-spacing:.5px;
  cursor:pointer;transition:all .2s;white-space:nowrap;
  font-family:'Syne',sans-serif;
}
.big-btn:hover{background:var(--accent-dim);box-shadow:0 0 20px rgba(0,194,255,.15)}
.big-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── WATCHLIST ── */
.wl-toggle{
  display:flex;align-items:center;gap:12px;
  cursor:pointer;width:100%;background:none;border:none;padding:0;margin:36px 0 0;
}
.wl-body{overflow:hidden;transition:max-height .35s ease,opacity .3s ease;max-height:1000px;opacity:1;margin-top:14px}
.wl-body.collapsed{max-height:0;opacity:0;margin-top:0}
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.tbl{width:100%;border-collapse:collapse}
.tbl th{
  font-size:9px;font-weight:600;color:var(--text3);
  letter-spacing:1.5px;text-transform:uppercase;
  padding:10px 16px;background:var(--bg3);
  border-bottom:1px solid var(--border);text-align:left;
  font-family:'Syne',sans-serif;
}
.tbl td{padding:10px 16px;font-size:12px;border-bottom:1px solid var(--border);color:var(--text2)}
.tbl td:first-child{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg3)}
.pill-tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-weight:600;font-size:11px;font-family:'DM Mono',monospace}
.pill-tag.up{background:var(--up-dim);color:var(--up);border:1px solid #00d97e33}
.pill-tag.down{background:var(--down-dim);color:var(--down);border:1px solid #ff4d6a33}
.pill-tag.flat{background:var(--bg3);color:var(--text3);border:1px solid var(--border2)}
.bar-wrap{width:48px;height:3px;display:inline-block;vertical-align:middle;margin-left:8px;background:var(--border2);border-radius:1px;overflow:hidden}
.bar-fill{height:100%;border-radius:1px}
.wl-chevron{
  background:var(--bg3);color:var(--text2);
  font-size:11px;font-weight:600;padding:4px 14px;
  border-radius:5px;border:1px solid var(--border2);
  font-family:'DM Mono',monospace;
}

/* ── COMMODITIES / VIX ── */
.vix-card{position:relative;overflow:hidden}
.vix-level{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block;margin-top:6px;letter-spacing:.5px;font-family:'DM Mono',monospace}
.vix-low{background:var(--up-dim);color:var(--up);border:1px solid #00d97e33}
.vix-mid{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid #f5c84233}
.vix-high{background:var(--down-dim);color:var(--down);border:1px solid #ff4d6a33}

/* ── SECTORS / MARGIN ── */
.tbl td:first-child.name{color:var(--text);font-family:inherit;font-size:12px}

/* ── CALENDAR ── */
.cal-list{display:flex;flex-direction:column;gap:8px}
.cal-item{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:14px 18px;display:flex;align-items:center;gap:16px;transition:border-color .2s;
}
.cal-item:hover{border-color:var(--border2)}
.cal-item.today{border-color:var(--accent);background:var(--accent-dim)}
.cal-item.past{opacity:.3}
.cal-date-box{
  text-align:center;min-width:46px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:6px 10px;flex-shrink:0;
}
.cal-date-box.t{background:var(--accent);border-color:var(--accent);box-shadow:0 0 16px rgba(0,194,255,.3)}
.cal-mo{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-family:'DM Mono',monospace}
.cal-dy{font-size:20px;font-weight:700;color:var(--text);line-height:1.1;font-family:'DM Mono',monospace}
.cal-date-box.t .cal-mo,.cal-date-box.t .cal-dy{color:#fff}
.cal-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.cal-info{flex:1}
.cal-ttl{font-size:13px;font-weight:500;color:var(--text)}
.cal-sub{font-size:11px;color:var(--text3);margin-top:2px}
.cal-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap;letter-spacing:.5px;font-family:'DM Mono',monospace}
.b-high{background:rgba(245,200,66,.12);color:var(--gold);border:1px solid #f5c84233}
.b-med{background:var(--accent-dim);color:var(--accent);border:1px solid #00c2ff33}

/* ── BUTTONS ── */
.btn{border:1px solid var(--border2);padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;background:var(--bg3);color:var(--text2)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#000}
.btn-primary:hover{box-shadow:0 0 16px rgba(0,194,255,.3)}
.btn-ghost{background:var(--bg3);border-color:var(--border2);color:var(--text2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--down-dim);border-color:#ff4d6a44;color:var(--down)}
.btn-sm{padding:3px 10px;font-size:11px;border-radius:5px}

/* ── MODALS ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:var(--bg2);border-radius:16px;padding:28px;width:360px;box-shadow:0 24px 64px rgba(0,0,0,.6);border:1px solid var(--border2)}
.modal h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;font-family:'Syne',sans-serif}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:20px}
.modal input,.modal select{
  width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  padding:9px 12px;border-radius:8px;font-size:13px;outline:none;margin-bottom:10px;
  transition:border .2s;font-family:inherit;
}
.modal input:focus,.modal select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,194,255,.1)}
.modal select option{background:var(--bg3)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.modal-err{font-size:11px;color:var(--down);margin-bottom:10px;background:var(--down-dim);padding:7px 11px;border-radius:6px;display:none;border-left:2px solid var(--down)}

/* ── LOADING / ERROR ── */
.loading{text-align:center;padding:36px;color:var(--text3);font-size:12px}
.spinner{width:20px;height:20px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{background:var(--down-dim);border:1px solid #ff4d6a33;border-radius:8px;padding:10px 14px;font-size:12px;color:var(--down);margin:10px;border-left:2px solid var(--down)}

/* ── NEWS ── */
.news-tabs{display:flex;gap:8px;margin-bottom:14px}
.ntab{
  background:var(--bg3);border:1px solid var(--border);color:var(--text3);
  padding:5px 16px;border-radius:5px;font-size:11px;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:'Syne',sans-serif;letter-spacing:.5px;
}
.ntab:hover{border-color:var(--border2);color:var(--text2)}
.ntab.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.news-list{display:flex;flex-direction:column;gap:6px}
.news-item{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 16px;transition:border-color .2s;text-decoration:none;display:block;color:inherit;
}
.news-item:hover{border-color:var(--border2)}
.news-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.55;margin-bottom:4px}
.news-digest{font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:4px}
.news-time{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}

/* ── WATCHLIST TAG ── */
.wl-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;letter-spacing:.3px}
.type-stock{background:var(--accent-dim);color:var(--accent);border:1px solid #00c2ff33}
.type-fund{background:var(--up-dim);color:var(--up);border:1px solid #00d97e33}

/* ── FOOTER ── */
.footer{text-align:center;padding:24px 0 40px;font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:.5px}
.footer span{color:var(--border2);margin:0 6px}

/* ── PAGE LOAD ANIMATION ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.wrap > *{animation:fadeUp .4s ease both}
.wrap > *:nth-child(1){animation-delay:.05s}
.wrap > *:nth-child(2){animation-delay:.1s}
.wrap > *:nth-child(3){animation-delay:.15s}
.wrap > *:nth-child(4){animation-delay:.2s}
.wrap > *:nth-child(5){animation-delay:.25s}
.wrap > *:nth-child(6){animation-delay:.3s}
.wrap > *:nth-child(7){animation-delay:.35s}
.wrap > *:nth-child(8){animation-delay:.4s}
.wrap > *:nth-child(9){animation-delay:.45s}
.wrap > *:nth-child(10){animation-delay:.5s}
.wrap > *:nth-child(11){animation-delay:.55s}
.wrap > *:nth-child(12){animation-delay:.6s}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">&#128200;</div>
    <div>
      <div class="header-title">星宇<span>·</span>财经简报</div>
      <div class="header-sub" id="todayDate"></div>
    </div>
  </div>
  <div class="header-right">
    <div>
      <div class="status-pill">
        <span class="status-dot" id="statusDot"></span>
        <span id="countdownPill">检测中...</span>
      </div>
      <div class="upd-time" id="updTime">——</div>
    </div>
  </div>
</div>

<div class="wrap">

<!-- 指数行情 -->
<div class="sec">
  <div class="sec-accent"></div>
  <span class="sec-label">指数行情</span>
  <div class="sec-line"></div>
</div>
<div class="g4" id="idxGrid">
  <div class="card"><div class="idx-flag">上证指数</div><div class="sk sk-h" style="margin-top:10px"></div><div class="sk sk-s"></div></div>
  <div class="card"><div class="idx-flag">深证成指</div><div class="sk sk-h" style="margin-top:10px"></div><div class="sk sk-s"></div></div>
  <div class="card"><div class="idx-flag">标普500</div><div class="sk sk-h" style="margin-top:10px"></div><div class="sk sk-s"></div></div>
  <div class="card"><div class="idx-flag">离岸人民币</div><div class="sk sk-h" style="margin-top:10px"></div><div class="sk sk-s"></div></div>
</div>

<!-- 北向资金 & 市场成交 -->
<div class="sec">
  <div class="sec-accent"></div>
  <span class="sec-label">市场概况</span>
  <div class="sec-line"></div>
</div>
<div class="g3" id="flowGrid">
  <div class="mcard mcard-vol" id="volumeCard">
    <div class="mcard-corner">VOLUME</div>
    <div class="flow-lbl">A股今日成交额</div>
    <div class="sk sk-h"></div>
  </div>
  <div class="mcard mcard-breadth" id="breadthCard">
    <div class="mcard-corner">BREADTH</div>
    <div class="flow-lbl">涨跌家数</div>
    <div class="sk sk-h"></div>
  </div>
  <div class="mcard mcard-north" id="northCard">
    <div class="mcard-corner">NORTH FLOW</div>
    <div class="flow-lbl">北向资金合计</div>
    <div class="sk sk-h"></div>
  </div>
</div>

<!-- 刷新按钮 -->
<div class="refresh-divider">
  <div class="rdl"></div>
  <button class="big-btn" id="bigRefBtn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    REFRESH ALL
  </button>
  <div class="rdr"></div>
</div>

<script>
var SB_URL='https://mqdioladvuqzsvcbjbzz.supabase.co';
var SB_KEY='sb_publishable_x2kfIbbWsovbhIeYNl34vg_3Oa0NvYd';
var EDIT_PW='xingyu';

function PROXY(url){return '/api/proxy?url='+encodeURIComponent(url);}

document.getElementById('todayDate').textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

var sbH={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
function sbGet(t){return fetch(SB_URL+'/rest/v1/'+t+'?select=*&order=id.asc',{headers:sbH,signal:AbortSignal.timeout(10000)}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});}
function sbIns(t,r){return fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:Object.assign({},sbH,{'Prefer':'return=representation'}),body:JSON.stringify(r)});}
function sbDel(t,id){return fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'DELETE',headers:sbH});}

function fmt(n,d){if(d===undefined)d=2;if(n==null)return '--';return n.toLocaleString('zh-CN',{minimumFractionDigits:d,maximumFractionDigits:d});}
function sgn(n){return n>0?'+':'';}
function cls(n){return n>0?'up':n<0?'down':'flat';}

function saveCache(key,val){
  // 本地缓存优先（localStorage）
  try{localStorage.setItem('fc_'+key,JSON.stringify({v:val,t:Date.now()}));}catch(e){}
  // 同步到 Supabase（upsert）
  fetch(SB_URL+'/rest/v1/cache',{method:'POST',headers:Object.assign({},sbH,{'Prefer':'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify({key:key,value:JSON.stringify(val),updated_at:new Date().toISOString()})}).catch(function(){});
}
function loadCache(key){
  // 先读本地缓存（24小时内有效）
  try{
    var raw=localStorage.getItem('fc_'+key);
    if(raw){var obj=JSON.parse(raw);if(obj&&Date.now()-obj.t<86400000)return Promise.resolve(obj.v);}
  }catch(e){}
  // 兜底读 Supabase
  return fetch(SB_URL+'/rest/v1/cache?key=eq.'+encodeURIComponent(key)+'&select=value',{headers:sbH})
    .then(function(r){return r.json();})
    .then(function(j){if(j&&j[0]&&j[0].value){try{return JSON.parse(j[0].value);}catch(e){return null;}}return null;})
    .catch(function(){return null;});
}

function fetchY(sym){
  return fetch(PROXY('https://query1.finance.yahoo.com/v8/finance/chart/'+encodeURIComponent(sym)+'?interval=1d&range=1d'),{signal:AbortSignal.timeout(10000)})
    .then(function(r){return r.json();})
    .then(function(j){var m=j.chart.result[0].meta;var chg=m.regularMarketPrice-m.chartPreviousClose;return{price:m.regularMarketPrice,prev:m.chartPreviousClose,chg:chg,pct:chg/m.chartPreviousClose*100};});
}
function fetchEM(url){return fetch(url,{signal:AbortSignal.timeout(10000),headers:{'Referer':'https://www.eastmoney.com/','User-Agent':'Mozilla/5.0'}}).then(function(r){return r.json();});}

var INDICES=[{sym:'000001.SS',name:'上证指数',dp:2},{sym:'399001.SZ',name:'深证成指',dp:2},{sym:'^GSPC',name:'标普500',dp:2},{sym:'USDCNH=X',name:'离岸人民币',dp:4}];
var COMMS=[{sym:'GC=F',name:'黄金',dp:2},{sym:'SI=F',name:'白银',dp:3},{sym:'CL=F',name:'原油(WTI)',dp:2},{sym:'HG=F',name:'铜期货',dp:3}];

function mkCard(info,d){
  if(!d)return '<div class="card"><div class="idx-flag">'+info.name+'</div><div class="idx-val flat" style="font-size:16px;margin-top:8px">获取失败</div></div>';
  var c=cls(d.pct);var arrow=c==='up'?'▲':c==='down'?'▼':'—';
  var barColor=c==='up'?'linear-gradient(90deg,#a7f3d0,#34d399)':c==='down'?'linear-gradient(90deg,#fca5a5,#f87171)':'#e5e7eb';
  return '<div class="card '+c+'-bg"><div class="idx-flag"><span style="font-size:10px;color:#9ca3af">'+info.name+'</span></div><div class="idx-val">'+fmt(d.price,info.dp)+'</div><span class="idx-chg '+c+'">'+arrow+' '+sgn(d.chg)+fmt(d.chg,info.dp)+' ('+sgn(d.pct)+fmt(d.pct,2)+'%)</span><div class="idx-prev">昨收 '+fmt(d.prev,info.dp)+'</div><div class="idx-bar" style="background:'+barColor+'"></div></div>';
}

function loadIndices(){return Promise.allSettled(INDICES.map(function(i){return fetchY(i.sym);})).then(function(res){document.getElementById('idxGrid').innerHTML=INDICES.map(function(i,x){return mkCard(i,res[x].status==='fulfilled'?res[x].value:null);}).join('');});}

function loadCommodities(){
  var all=COMMS.map(function(i){return fetchY(i.sym);});all.push(fetchY('^VIX'));
  return Promise.allSettled(all).then(function(res){
    var cmdHtml=COMMS.map(function(i,x){return mkCard(i,res[x].status==='fulfilled'?res[x].value:null);}).join('');
    var vd=res[4].status==='fulfilled'?res[4].value:null;
    var vixHtml='';
    if(!vd){vixHtml='<div class="card vix-card"><div class="idx-flag">恐慌指数 VIX</div><div class="idx-val flat" style="font-size:16px;margin-top:8px">获取失败</div></div>';}
    else{var v=vd.price;var level=v<15?'低恐慌':v<25?'中等':v<35?'高恐慌':'极度恐慌';var lvlCls=v<15?'vix-low':v<25?'vix-mid':'vix-high';var c=cls(vd.pct);var arrow=c==='up'?'▲':c==='down'?'▼':'—';vixHtml='<div class="card vix-card '+c+'-bg"><div class="idx-flag"><span style="font-size:10px;color:#9ca3af">恐慌指数 VIX</span></div><div class="idx-val">'+fmt(v,2)+'</div><span class="idx-chg '+c+'">'+arrow+' '+sgn(vd.chg)+fmt(vd.chg,2)+' ('+sgn(vd.pct)+fmt(vd.pct,2)+'%)</span><div class="vix-level '+lvlCls+'">'+level+'</div></div>';}
    document.getElementById('cmdGrid').innerHTML=cmdHtml+vixHtml;
  });
}

function loadFundFlow(){
  return fetchEM('https://push2.eastmoney.com/api/qt/kamt.rtmin/get?fields1=f1,f2,f3,f4&fields2=f51,f52,f53,f54&ut=b2884a393a59ad64002292a3e90d46a5&cb=')
    .then(function(j){
      var d=j&&j.data;
      if(!d)throw new Error('no data');
      function lastValid(arr,col){
        if(!Array.isArray(arr))return null;
        for(var i=arr.length-1;i>=0;i--){
          var parts=arr[i].split(',');
          if(parts.length<=col)continue;
          var raw=parts[col];
          if(raw==='-'||raw===''||raw==null)continue;
          var v=parseFloat(raw);
          if(!isNaN(v)&&v!==0)return v;
        }
        return null;
      }
      var s2n=d.s2n||[];
      var sh=lastValid(s2n,1);
      var sz=lastValid(s2n,2);
      var tot=lastValid(s2n,3);
      if(tot==null&&sh!=null&&sz!=null)tot=sh+sz;
      var gotLive=(tot!=null);
      if(tot!=null)saveCache('flow_tot',tot);
      return (tot!=null?Promise.resolve(tot):loadCache('flow_tot'))
        .then(function(v){renderNorth(v,!gotLive);});
    }).catch(function(){
      return loadCache('flow_tot').then(function(v){renderNorth(v,true);});
    });
}

function renderNorth(tot,fromCache){
  var nc=document.getElementById('northCard');if(!nc)return;
  var statusTxt=fromCache?(tot?'CLOSED':'CLOSED'):'LIVE';
  var tag='<span class="mcard-badge">'+statusTxt+'</span>';
  // kamt.rtmin 单位是万元，除以10000得到亿
  var fv=(tot==null)?'<span style="color:var(--text3)">--</span>':((tot>=0?'+':'')+fmt(tot/10000,2)+'<span style="font-size:13px;font-weight:500;color:var(--text3);margin-left:3px">亿</span>');
  var valColor=(tot==null)?'var(--text3)':(tot>=0?'var(--gold)':'var(--down)');
  var sub=(tot==null)?(fromCache?'港股休市暂无数据':'数据暂未披露'):(tot>=0?'资金净流入 ↑':'资金净流出 ↓');
  var pct=Math.min(Math.abs(tot||0)/5000000*100,100);
  nc.innerHTML='<div class="mcard-corner">NORTH FLOW</div>'
    +'<div class="flow-lbl">北向资金合计</div>'
    +tag
    +'<div class="flow-val" style="color:'+valColor+';font-size:28px;margin:2px 0">'+fv+'</div>'
    +'<div class="flow-sub">'+sub+'</div>'
    +'<div class="flow-track"><div class="flow-fill" style="width:'+pct+'%;background:var(--gold)"></div></div>';
}

function loadVolume(){
  return fetchEM('https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&fields=f2,f3,f4,f5,f6,f104,f105,f106&secids=1.000001,0.399001&ut=fa5fd1943c7b386f172d6893dbfba10b')
    .then(function(j){
      var diff=j.data&&j.data.diff?j.data.diff:[];
      var sh=diff[0]||{};var sz=diff[1]||{};
      var totalVol=(sh.f6&&sz.f6)?(sh.f6+sz.f6)/100000000:null;
      var up=(sh.f104||0)+(sz.f104||0);
      var down=(sh.f105||0)+(sz.f105||0);
      var flat=(sh.f106||0)+(sz.f106||0);
      var gotVol=(totalVol!=null&&totalVol>0);
      var gotBreadth=(up>0||down>0);
      if(gotVol)saveCache('volume',totalVol);
      if(gotBreadth)saveCache('breadth',{up:up,down:down,flat:flat});
      var p1=gotVol?Promise.resolve(totalVol):loadCache('volume');
      var p2=gotBreadth?Promise.resolve({up:up,down:down,flat:flat}):loadCache('breadth');
      return Promise.all([p1,p2]).then(function(v){
        setVolumeCard(v[0],!gotVol);
        setBreadthCard(v[1],!gotBreadth);
      });
    }).catch(function(){
      return Promise.all([loadCache('volume'),loadCache('breadth')]).then(function(v){
        setVolumeCard(v[0],true);setBreadthCard(v[1],true);
      });
    });
}
function setVolumeCard(val,cached){
  var tag=(cached&&val)?'<span class="mcard-badge">CLOSED</span>':'<span class="mcard-badge">LIVE</span>';
  var vc=document.getElementById('volumeCard');if(!vc)return;
  vc.innerHTML='<div class="mcard-corner">VOLUME</div>'
    +'<div class="flow-lbl">A股今日成交额</div>'
    +tag
    +'<div class="flow-val" style="color:var(--accent);font-size:28px;margin:2px 0">'+(val?fmt(val,0)+'<span style="font-size:13px;font-weight:500;color:var(--text3);margin-left:3px">亿</span>':'<span style="color:var(--text3)">--</span>')+'</div>'
    +'<div class="flow-sub">'+(val?'沪深两市合计':'暂无数据')+'</div>'
    +'<div class="flow-track"><div class="flow-fill" style="width:'+(val?Math.min(val/20000*100,100):0)+'%;background:var(--accent)"></div></div>';
}
function setBreadthCard(d,cached){
  var bc=document.getElementById('breadthCard');if(!bc)return;
  var tag=(cached&&d)?'<span class="mcard-badge">CLOSED</span>':'<span class="mcard-badge">LIVE</span>';
  if(!d){
    bc.innerHTML='<div class="mcard-corner">BREADTH</div>'
      +'<div class="flow-lbl">涨跌家数</div><div class="flow-val" style="color:var(--text3)">--</div><div class="flow-sub">暂无数据</div>';
    return;
  }
  var total=d.up+d.down+d.flat;
  var upPct=total>0?Math.round(d.up/total*100):0;
  bc.innerHTML='<div class="mcard-corner">BREADTH</div>'
    +'<div class="flow-lbl">涨跌家数</div>'
    +tag
    +'<div style="display:flex;align-items:baseline;gap:12px;margin:2px 0">'
    +'<span style="font-size:26px;font-weight:700;color:var(--up);font-family:'DM Mono',monospace">▲'+d.up+'</span>'
    +'<span style="font-size:26px;font-weight:700;color:var(--down);font-family:'DM Mono',monospace">▼'+d.down+'</span>'
    +(d.flat?'<span style="font-size:12px;color:var(--text3);font-family:'DM Mono',monospace">'+d.flat+'</span>':'')
    +'</div>'
    +'<div class="flow-sub">上涨占比 '+upPct+'%</div>'
    +'<div class="flow-track"><div class="flow-fill" style="width:'+upPct+'%;background:var(--up)"></div></div>';
}

function loadSectors(){
  return fetchEM('https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=20&po=1&np=1&ut=bd1d9ddb04089700cf9c27f6f7426281&fltt=2&invt=2&fid=f3&fs=m:90+t:2+f:!50&fields=f2,f3,f4,f12,f14')
    .then(function(j){
      var list=(j.data&&j.data.diff?j.data.diff:[]).sort(function(a,b){return b.f3-a.f3;});
      if(!list.length){document.getElementById('sectorCard').innerHTML='<div class="loading">暂无数据</div>';return;}
      var mx=Math.max.apply(null,list.map(function(s){return Math.abs(s.f3);}));
      var rows=list.slice(0,12).map(function(s){var c=cls(s.f3);return '<tr><td style="font-weight:600">'+s.f14+'</td><td><span class="pill-tag '+c+'">'+sgn(s.f3)+fmt(s.f3,2)+'%</span><span class="bar-wrap"><span class="bar-fill" style="width:'+Math.abs(s.f3)/mx*100+'%;background:'+(s.f3>=0?'#34d399':'#f87171')+'"></span></span></td></tr>';}).join('');
      document.getElementById('sectorCard').innerHTML='<table class="tbl"><thead><tr><th>板块</th><th>涨跌幅</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }).catch(function(){document.getElementById('sectorCard').innerHTML='<div class="err-box">板块数据获取失败</div>';});
}

function loadMargin(){
  return fetch(PROXY('https://datacenter-web.eastmoney.com/api/data/v1/get?reportName=RPTA_RZRQ_LSHJ&columns=ALL&source=WEB&sortColumns=DIM_DATE&sortTypes=-1&pageNumber=1&pageSize=1'),{signal:AbortSignal.timeout(10000)})
    .then(function(r){return r.json();})
    .then(function(j){
      var d=(j.result&&j.result.data&&j.result.data[0])?j.result.data[0]:null;
      if(d){var obj={rz:d.RZYE,rq:d.RQYE,tot:d.RZRQYE};saveCache('margin',obj);renderMargin(obj,false);}
      else{return loadCache('margin').then(function(c){renderMargin(c,true);});}
    }).catch(function(){return loadCache('margin').then(function(c){renderMargin(c,true);});});
}
function renderMargin(d,fromCache){
  var tag=(fromCache&&d)?'<span style="font-size:9px;color:#9ca3af;margin-left:4px">最新</span>':'';
  var items=[{l:'融资余额',dot:'#f59e0b',v:d?d.rz:null},{l:'融券余额',dot:'#ef4444',v:d?d.rq:null},{l:'融资融券合计',dot:'#8b5cf6',v:d?d.tot:null}];
  document.getElementById('marginGrid').innerHTML=items.map(function(f){return '<div class="card"><div class="flow-lbl" style="color:var(--text3)">'+f.l+tag+'</div><div class="flow-val" style="color:var(--text);font-family:\"DM Mono\",monospace;font-size:20px">'+(f.v==null?'<span style="color:var(--text3)">--</span>':fmt(f.v/100000000,0)+'<span style="font-size:12px;color:var(--text3)"> 亿</span>')+'</div><div class="flow-sub" style="font-family:\"DM Mono\",monospace">'+(f.v==null?'暂无数据':'余额数据')+'</div></div>';}).join('');
}

function fetchFundPrice(code){
  return fetch(PROXY('https://fundgz.1234567.com.cn/js/'+code+'.js?rt='+Date.now()),{signal:AbortSignal.timeout(8000)})
    .then(function(r){return r.text();})
    .then(function(txt){var m=txt.match(/jsonpgz\((.*)\)/);if(!m||!m[1])return null;var d=JSON.parse(m[1]);var price=parseFloat(d.gsz)||0;var prev=parseFloat(d.dwjz)||price;var pct=parseFloat(d.gszzl)||0;return{price:price,prev:prev,chg:price-prev,pct:pct};})
    .catch(function(){return null;});
}

var wlData=[],pendingDel=null,pwCb=null,wlOpen=true;
function toggleWl(){wlOpen=!wlOpen;document.getElementById('wlBody').classList.toggle('collapsed',!wlOpen);document.getElementById('wlChevron').textContent=wlOpen?'收起 ↑':'展开 ↓';}

function loadWatchlist(){
  return sbGet('watchlist').then(function(data){
    wlData=data;
    if(!Array.isArray(wlData)||!wlData.length){document.getElementById('wlCard').innerHTML='<div class="loading" style="padding:24px">自选列表为空，点击"添加"开始添加</div>';return;}
    return Promise.allSettled(wlData.map(function(w){
      if(w.type==='fund')return fetchFundPrice(w.code);
      var sym=w.code;
      if(/^\d{6}$/.test(w.code))sym=w.code+(w.code.startsWith('6')?'.SS':'.SZ');
      else if(/^\d{5}$/.test(w.code))sym=w.code+'.HK';
      return fetchY(sym);
    })).then(function(prices){
      var rows=wlData.map(function(w,i){
        var p=prices[i].status==='fulfilled'?prices[i].value:null;var c=p?cls(p.pct):'flat';
        return '<tr><td style="color:#6b7280;font-size:11px;font-weight:600">'+w.code+'</td><td style="font-weight:700">'+w.name+'</td><td><span class="wl-tag '+(w.type==='fund'?'type-fund':'type-stock')+'">'+(w.type==='fund'?'基金':'股票')+'</span></td><td class="'+c+'" style="font-weight:700">'+(p&&p.price?fmt(p.price):'--')+'</td><td><span class="pill-tag '+c+'">'+(p&&p.pct!=null?sgn(p.pct)+fmt(p.pct,2)+'%':'--')+'</span></td><td><button class="btn btn-ghost btn-sm" onclick="openDelModal('+w.id+',\''+w.name.replace(/'/g,"\\'")+'\')">\u79fb\u9664</button></td></tr>';
      }).join('');
      document.getElementById('wlCard').innerHTML='<table class="tbl"><thead><tr><th>代码</th><th>名称</th><th>类型</th><th>最新价</th><th>涨跌幅</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
    });
  }).catch(function(e){document.getElementById('wlCard').innerHTML='<div class="err-box">加载失败：'+e.message+'</div>';});
}

function openWlModal(){
  document.getElementById('modalErr').style.display='none';document.getElementById('pwInput').value='';
  document.getElementById('modalExtra').innerHTML='<input type="text" id="wlCode" placeholder="股票/基金代码（如 600519）"><input type="text" id="wlName" placeholder="名称（如 贵州茅台）"><select id="wlType"><option value="stock">股票</option><option value="fund">基金</option></select>';
  pwCb=function(){var code=document.getElementById('wlCode').value.trim();var name=document.getElementById('wlName').value.trim();var type=document.getElementById('wlType').value;if(!code||!name){document.getElementById('modalErr').textContent='请填写代码和名称';document.getElementById('modalErr').style.display='block';return Promise.resolve(false);}return sbIns('watchlist',{code:code,name:name,type:type}).then(function(r){if(!r.ok){document.getElementById('modalErr').textContent='添加失败，请重试';document.getElementById('modalErr').style.display='block';return false;}return true;});};
  document.getElementById('pwModal').classList.add('show');setTimeout(function(){document.getElementById('pwInput').focus();},100);
}
function openDelModal(id,name){pendingDel={id:id,name:name};document.getElementById('delName').textContent=name;document.getElementById('delErr').style.display='none';document.getElementById('delModal').classList.add('show');}
function closeDelModal(){document.getElementById('delModal').classList.remove('show');pendingDel=null;}
function confirmDel(){if(!pendingDel)return;sbDel('watchlist',pendingDel.id).then(function(r){if(!r.ok){document.getElementById('delErr').textContent='删除失败';document.getElementById('delErr').style.display='block';return;}closeDelModal();loadWatchlist();});}
function closePwModal(){document.getElementById('pwModal').classList.remove('show');pwCb=null;}
function confirmPw(){if(document.getElementById('pwInput').value!==EDIT_PW){document.getElementById('modalErr').textContent='密码错误，请重试';document.getElementById('modalErr').style.display='block';return;}if(pwCb){pwCb().then(function(ok){if(ok===false)return;closePwModal();loadWatchlist();});}}

function loadCalendar(){
  var ts=new Date().toISOString().slice(0,10);
  var events=[
    {date:'2025-04-02',title:'美国非农就业数据',sub:'3月非农就业人数',imp:'high'},
    {date:'2025-04-10',title:'美国 CPI 通胀数据',sub:'3月消费者物价指数',imp:'high'},
    {date:'2025-04-16',title:'中国 GDP 季报',sub:'2025年Q1 GDP增速',imp:'high'},
    {date:'2025-04-30',title:'美联储 FOMC 利率决议',sub:'4月利率决定',imp:'high'},
    {date:'2025-05-02',title:'美国非农就业数据',sub:'4月非农就业人数',imp:'high'},
    {date:'2025-05-13',title:'美国 CPI 通胀数据',sub:'4月消费者物价指数',imp:'high'},
    {date:'2025-06-11',title:'美联储 FOMC 利率决议',sub:'6月利率决定',imp:'high'},
    {date:'2025-07-09',title:'美联储 FOMC 利率决议',sub:'7月利率决定',imp:'high'},
  ];
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var past=events.filter(function(e){return e.date<ts;}).slice(-1);
  var upcoming=events.filter(function(e){return e.date>=ts;}).slice(0,6);
  document.getElementById('calList').innerHTML=past.concat(upcoming).map(function(e){
    var isT=e.date===ts,isP=e.date<ts;var d=new Date(e.date);
    return '<div class="cal-item'+(isT?' today':'')+(isP?' past':'')+'"><div class="cal-date-box'+(isT?' t':'')+'"><div class="cal-mo">'+months[d.getMonth()]+'</div><div class="cal-dy">'+d.getDate()+'</div></div><span class="cal-dot" style="background:'+(e.imp==='high'?'#8b5cf6':'#3b82f6')+'"></span><div class="cal-info"><div class="cal-ttl">'+e.title+(isT?' <span style="color:#4f46e5;font-size:10px;font-weight:800"> · 今天</span>':'')+'</div><div class="cal-sub">'+e.sub+'</div></div><span class="cal-badge '+(e.imp==='high'?'b-high':'b-med')+'">'+(e.imp==='high'?'重要':'关注')+'</span></div>';
  }).join('');
}

var curNewsTab='em';
function switchNews(tab,el){curNewsTab=tab;document.querySelectorAll('.ntab').forEach(function(b){b.classList.remove('on');});el.classList.add('on');loadNews(tab);}
function loadNews(tab){
  document.getElementById('newsArea').innerHTML='<div class="loading"><div class="spinner"></div>加载中...</div>';
  if(tab==='em'){
    fetch(PROXY('https://newsapi.eastmoney.com/kuaixun/v1/getlist_102_ajaxResult_50_1_.html'),{signal:AbortSignal.timeout(10000)})
      .then(function(r){return r.text();})
      .then(function(txt){
        var m=txt.match(/ajaxResult=(.+)/);if(!m)throw new Error('解析失败');
        var j=JSON.parse(m[1]);var items=j.LivesList.slice(0,15);
        document.getElementById('newsArea').innerHTML='<div class="news-list">'+items.map(function(item){
          return '<div class="news-item"><div class="news-title">'+item.title+'</div>'+(item.digest&&item.digest!==item.title?'<div class="news-digest">'+item.digest+'</div>':'')+'<div class="news-time">'+item.showtime+'</div></div>';
        }).join('')+'</div>';
      }).catch(function(e){document.getElementById('newsArea').innerHTML='<div class="err-box">东方财富快讯加载失败：'+e.message+'</div>';});
  } else {
    fetch(PROXY('https://feed.mix.sina.com.cn/api/roll/get?pageid=153&lid=2516&k=&num=20&page=1'),{signal:AbortSignal.timeout(10000)})
      .then(function(r){return r.json();})
      .then(function(j){
        var items=j.result.data.slice(0,15);
        document.getElementById('newsArea').innerHTML='<div class="news-list">'+items.map(function(item){
          var t=new Date(parseInt(item.ctime)*1000);var timeStr=t.getHours()+':'+String(t.getMinutes()).padStart(2,'0');
          return '<a class="news-item" href="'+item.url+'" target="_blank" rel="noopener"><div class="news-title">'+item.title+'</div>'+(item.intro?'<div class="news-digest">'+item.intro.slice(0,80)+'...</div>':'')+'<div class="news-time">'+timeStr+'</div></a>';
        }).join('')+'</div>';
      }).catch(function(e){document.getElementById('newsArea').innerHTML='<div class="err-box">新浪财经加载失败：'+e.message+'</div>';});
  }
}

function isMarketOpen(){var now=new Date(),day=now.getDay();if(day===0||day===6)return false;var mins=now.getHours()*60+now.getMinutes();return(mins>=9*60+25&&mins<=15*60+5)||(mins>=21*60+30||mins<=4*60);}
function updateCountdown(){
  var el=document.getElementById('countdownPill');
  var dot=document.getElementById('statusDot');
  if(!el)return;
  var now=new Date(),day=now.getDay();var msg='';var live=false;
  if(day===0||day===6){msg='WEEKEND · CLOSED';}
  else{
    var mins=now.getHours()*60+now.getMinutes();
    if(mins>=9*60+25&&mins<=15*60+5){msg='A股 · LIVE';live=true;}
    else if(mins>=21*60+30||mins<=4*60){msg='US · LIVE';live=true;}
    else if(mins<9*60+25){var diff=(9*60+25)-mins;msg='A股开盘 '+Math.floor(diff/60)+'h'+diff%60+'m';}
    else{msg='CLOSED';}
  }
  el.textContent=msg;
  if(dot){dot.className='status-dot'+(live?' live':'');}
}

function loadAll(){
  var btn=document.getElementById('bigRefBtn');if(btn){btn.disabled=true;btn.textContent='刷新中...';}
  return Promise.all([loadIndices(),loadCommodities(),loadFundFlow(),loadVolume(),loadSectors(),loadMargin(),loadWatchlist(),loadNews(curNewsTab)])
    .then(function(){
      loadCalendar();
      document.getElementById('updTime').textContent='更新于 '+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
      if(btn){btn.disabled=false;btn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> 刷新全部数据';}
    });
}

document.getElementById('bigRefBtn').onclick=loadAll;
loadAll();
updateCountdown();
setInterval(function(){updateCountdown();if(isMarketOpen())loadAll();},30000);
</script>
